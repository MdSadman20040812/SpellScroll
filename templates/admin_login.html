{% extends 'base.html' %}

{% block title %}SpellScroll — Admin Access{% endblock %}

{% block content %}
<div class="relative min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-darkSurface border border-white/5 p-8 rounded-2xl shadow-2xl relative">
        
        <div class="text-center mb-8">
            <h1 class="font-display text-2xl font-bold tracking-widest text-accentSecondary text-neon-mint mb-2">
                ADMIN ACCESS
            </h1>
            <p class="text-xs text-textMuted uppercase tracking-wider font-semibold">Spellmaster Portal</p>
        </div>

        <form action="{% url 'admin_login' %}" method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-textMuted mb-2">Admin Username</label>
                <input type="text" name="username" required class="w-full bg-darkBg border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-accentSecondary transition text-white">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-textMuted mb-2">Secret Key</label>
                <input type="password" name="password" required class="w-full bg-darkBg border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-accentSecondary transition text-white">
            </div>
            
            <button type="submit" class="w-full bg-accentSecondary text-darkBg font-bold text-sm py-3 px-4 rounded-lg hover:bg-accentSecondary/90 transition shadow-[0_0_15px_rgba(52,211,153,0.2)] mt-2">
                Verify Credentials
            </button>
        </form>

    </div>
</div>
{% endblock %}
