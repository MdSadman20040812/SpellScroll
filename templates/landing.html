{% extends 'base.html' %}

{% block title %}SpellScroll — Unlock Your Magic Catalog{% endblock %}

{% block content %}
<div class="relative min-h-[85vh] flex items-center justify-center py-12 px-4 overflow-hidden">
    <!-- Neon Background Orbs -->
    <div class="absolute top-1/4 left-1/4 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-accentPrimary/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 translate-x-1/2 translate-y-1/2 w-96 h-96 bg-accentSecondary/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="max-w-md w-full bg-darkSurface border border-white/5 p-8 rounded-2xl relative z-10 shadow-2xl" x-data="{ isLogin: true }">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="font-display text-4xl font-black tracking-widest text-accentPrimary text-neon-violet mb-2">
                SPELLSCROLL
            </h1>
            <p class="text-sm text-textMuted font-medium tracking-wide">
                AI-curated colorful webtoon discovery
            </p>
        </div>

        <!-- Forms -->
        <div class="space-y-6">
            <!-- Login Form -->
            <form x-show="isLogin" action="{% url 'login' %}" method="POST" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-textMuted mb-2">Username</label>
                    <input type="text" name="username" required class="w-full bg-darkBg border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-accentPrimary transition text-white">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-textMuted mb-2">Password</label>
                    <input type="password" name="password" required class="w-full bg-darkBg border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-accentPrimary transition text-white">
                </div>
                
                <button type="submit" class="w-full bg-accentPrimary text-darkBg font-bold text-sm py-3 px-4 rounded-lg hover:bg-accentPrimary/90 transition duration-300 transform active:scale-95 shadow-[0_0_15px_rgba(167,139,250,0.3)] mt-2">
                    Enter the Archive
                </button>
            </form>

            <!-- Register Form -->
            <form x-show="!isLogin" action="{% url 'register' %}" method="POST" class="space-y-4" x-cloak>
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-textMuted mb-2">Username</label>
                    <input type="text" name="username" required class="w-full bg-darkBg border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-accentPrimary transition text-white">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-textMuted mb-2">Display Name</label>
                    <input type="text" name="display_name" class="w-full bg-darkBg border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-accentPrimary transition text-white" placeholder="Optional">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-textMuted mb-2">Email Address</label>
                    <input type="email" name="email" required class="w-full bg-darkBg border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-accentPrimary transition text-white">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-textMuted mb-2">Password</label>
                    <input type="password" name="password" required class="w-full bg-darkBg border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-accentPrimary transition text-white">
                </div>
                
                <button type="submit" class="w-full bg-accentSecondary text-darkBg font-bold text-sm py-3 px-4 rounded-lg hover:bg-accentSecondary/90 transition duration-300 transform active:scale-95 shadow-[0_0_15px_rgba(52,211,153,0.3)] mt-2">
                    Forge New Key
                </button>
            </form>

            <!-- Toggle Button -->
            <div class="text-center pt-4 border-t border-white/5">
                <button @click="isLogin = !isLogin" class="text-xs font-semibold text-accentPrimary hover:underline transition">
                    <span x-text="isLogin ? 'Create an account instead' : 'Already have a key? Log in'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
